<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CESC Help & Support</title>
  <link rel="stylesheet" href="styles.css">
  <!-- FontAwesome for icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
<!-- Chat Bubble -->
<div class="chat-bubble" id="chatBubble">
  <img src="./images/ebuddy-icon.png" alt="Chat Icon" onerror="this.style.display='none'">
</div>
<!-- Chatbot -->
<div class="chatbot" id="chatbot">
  <!-- Header with Company Logos -->
  <div class="chat-header">
    <div class="header-left">
      <!-- CESC Logo (Left) -->
      <div class="company-logo cesc-logo">
        <img src="./images/header-icon.png" alt="RP-Sanjiv Goenka Group" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iODAiIGhlaWdodD0iNDAiIHZpZXdCb3g9IjAgMCA4MCA0MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KICA8cmVjdCB3aWR0aD0iODAiIGhlaWdodD0iNDAiIGZpbGw9IndoaXRlIi8+CiAgPHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxNCIgZm9udC13ZWlnaHQ9ImJvbGQiIGZpbGw9IiMwMDY2QjMiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGR5PSIuM2VtIj5DRVNDPC90ZXh0Pgo8L3N2Zz4='">
      </div>
    </div>
    <div class="header-actions">
      <!-- RP-Sanjiv Goenka Logo (Right) -->
      <div class="company-logo rp-logo">
        <img src="./images/cesc-icon.png" alt="CESC Limited" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iODAiIGhlaWdodD0iNDAiIHZpZXdCb3g9IjAgMCA4MCA0MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KICA8cmVjdCB3aWR0aD0iODAiIGhlaWdodD0iNDAiIGZpbGw9IndoaXRlIi8+CiAgPHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxMCIgZm9udC13ZWlnaHQ9ImJvbGQiIGZpbGw9IiM4ODMzOTkiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGR5PSIuM2VtIj5SUC1TRzwvdGV4dD4KPC9zdmc+'">
      </div>
      <span id="minimizeBtn" class="header-btn">—</span>
      <span id="closeBtn" class="header-btn">✕</span>
    </div>
  </div>
  <!-- Chat Body -->
  <div class="chat-body" id="chatBody">
    <div class="message bot">
      <div class="message-content">
       Dear Consumer, Welcome to CESC Limited. I am Aastha, your AI-powered assistant, here to support you with 
       your requests and ensure safe, reliable service. Please let me know how I may assist you today.
      </div>
    </div>
  </div>
  <!-- Footer -->
  <div class="chat-footer">
    <label for="fileUpload" class="attach-icon" id="attachLabel">
      <i class="fas fa-paperclip"></i>
    </label>
    <input type="file" id="fileUpload" hidden accept=".pdf,.doc,.docx,.txt,.png,.jpg,.jpeg">

    <!-- Input + file preview column -->
    <div class="input-col" id="inputCol">
      <!-- File preview chip (shown after file is selected, before send) -->
      <div class="file-preview-bar" id="filePreviewBar" style="display:none;">
        <span class="file-chip">
          <i class="fas fa-paperclip"></i>
          <span id="filePreviewName"></span>
          <button class="file-chip-remove" id="fileChipRemove" title="Remove file">✕</button>
        </span>
      </div>

      <!-- Input field wrapper -->
      <div class="input-wrapper" id="inputWrapper">
        <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off">
      </div>
    </div>
    
    <!-- Recording UI (hidden by default) -->
    <div class="recording-ui" id="recordingUI">
      <div class="recording-animation">
        <div class="recording-dot"></div>
        <span class="recording-timer" id="recordingTimer">0:00</span>
      </div>
      <div class="recording-waveform" id="waveform">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <button class="cancel-recording" id="cancelRecording">
        <i class="fas fa-trash"></i>
      </button>
    </div>
    
    <!-- Audio Button -->
    <button id="audioBtn" class="audio-btn active">
      <i class="fas fa-microphone"></i>
    </button>
    <!-- Send Button -->
    <button id="sendBtn" class="send-btn">
      <i class="fas fa-paper-plane"></i>
    </button>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
